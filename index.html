<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes Chile</title>
    <!-- Bootstrap 5.3 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- CSS propio -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#inicio">
            <img src="assets/img/viajes.svg" alt="Logo Viajes Chile" class="logo-nav me-2">
             Viajes Chile
             </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Menú de navegación"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#inicio">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#quienes-somos">Quiénes Somos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#destacados">Destacados</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#contacto">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Carousel -->
    <header id="inicio">
    <div id="carouselViajes" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselViajes" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#carouselViajes" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#carouselViajes" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="assets/img/carousel1.jpg" class="d-block w-100" alt="Desierto">
            </div>

            <div class="carousel-item">
                <img src="assets/img/carousel2.jpg" class="d-block w-100" alt="Montañas">
            </div>

            <div class="carousel-item">
                <img src="assets/img/carousel3.jpg" class="d-block w-100" alt="Paisaje">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselViajes" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselViajes" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
    </header>


     <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS propio -->
    <script src="assets/js/script.js"></script>
</body>
</html>
